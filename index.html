<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Week 3 - Semantics and Lists</title>
</head>
<body>
    <header>
        <h1>HTML Week 3 - Semantics and Lists</h1>
        <h3>Plus an intro to CSS</h3>
    </header>

    <nav>
          <!-- the nav tag resreve a space for navigation links -->
        <a href="#">Home</a>
    </nav>
    
    <main>
        <!-- article is a  self-contained block of text -->  
     <article>
            <h2>Articles should have a heading</h2>
            <p>This is the text of the article.</p>
         
     </article>
        <!-- an aside is for separtate cntact that isnt necessary to understand th e page -->
     <aside>
         <h3>Asides should also have a heading</h3>
         <p>This is the text of the aside.</p>
     </aside>

    </main>
    <footer>
        <p>scary stuff &copy; scary people</p>
    </footer>
</body>
</html>
